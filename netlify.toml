[build]
  publish = "."
  functions = "netlify/functions"

# Clean URL for the AV proxy
[[redirects]]
  from = "/api/av"
  to   = "/.netlify/functions/av"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options     = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy     = "strict-origin-when-cross-origin"
