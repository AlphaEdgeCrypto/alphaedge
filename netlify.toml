[build]
  publish = "."
  functions = "netlify/functions"
  command = "cd netlify/functions && npm install"

# Clean URLs for serverless functions
[[redirects]]
  from = "/api/av"
  to   = "/.netlify/functions/av"
  status = 200

[[redirects]]
  from = "/api/user-count"
  to   = "/.netlify/functions/user-count"
  status = 200

[[redirects]]
  from = "/api/increment-count"
  to   = "/.netlify/functions/increment-count"
  status = 200

[[redirects]]
  from = "/api/seed-count"
  to   = "/.netlify/functions/seed-count"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options     = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy     = "strict-origin-when-cross-origin"
